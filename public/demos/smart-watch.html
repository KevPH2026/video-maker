<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;overflow:hidden;background:#0a0a14;font-family:system-ui}
.s{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0}
.s1{background:linear-gradient(135deg,#0a0a14,#1a0a00)}
.s2{background:linear-gradient(135deg,#0a0a14,#001a10)}
.s3{background:linear-gradient(135deg,#0a0a14,#0a001a)}
.s4{background:#0a0a14}
.c{position:absolute}
.glow{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,0.15),transparent 70%)}
</style>
</head>
<body>
<div id="comp" data-composition-id="video" data-width="1920" data-height="1080" data-start="0" data-duration="22">
<div class="glow" style="top:20%;left:50%;transform:translateX(-50%)"></div>
<div class="s s1" style="opacity:1"><div class="c" style="font-size:96px;font-weight:900;color:#fff;text-align:center">Smart Watch<br><span style="color:#f59e0b">Pro X</span></div></div>
<div class="s s2"><div class="c" style="font-size:48px;font-weight:700;color:#fff;text-align:center;line-height:1.6">心率 · GPS · 防水<br><span style="color:#f59e0b;font-size:24px">7天超长续航</span></div></div>
<div class="s s3"><div class="c" style="display:flex;gap:80px"><div style="text-align:center"><div style="font-size:72px;font-weight:900;color:#f59e0b">$399</div><div style="font-size:14px;color:#888;margin-top:8px">限时优惠</div></div><div style="text-align:center"><div style="font-size:72px;font-weight:900;color:#f59e0b">100K+</div><div style="font-size:14px;color:#888;margin-top:8px">全球用户</div></div></div></div>
<div class="s s4"><div class="c" style="font-size:64px;font-weight:900;color:#fff;text-align:center">立即体验<br><span style="color:#f59e0b">www.smartwatchpro.com</span></div></div>
</div>

<script>
const tl=gsap.timeline({repeat:0});
tl.to(".s1",{opacity:1,duration:0.3},0)
tl.from(".s1 .c",{y:80,opacity:0,duration:1.2,ease:"power3.out"},0)
tl.to(".s1",{opacity:0,duration:0.5},5)
tl.to(".s2",{opacity:1,duration:0.3},5.3)
tl.from(".s2 .c",{scale:0.8,opacity:0,duration:1,ease:"back.out(1.4)"},5.5)
tl.to(".s2",{opacity:0,duration:0.5},10)
tl.to(".s3",{opacity:1,duration:0.3},10.5)
tl.from(".s3 .c",{y:40,opacity:0,duration:1},10.7)
tl.to(".s3",{opacity:0,duration:0.5},15.5)
tl.to(".s4",{opacity:1,duration:0.3},16)
tl.from(".s4 .c",{scale:0.9,opacity:0,duration:1},16.3)
tl.to(".s4",{opacity:0,duration:1.5},21)
window.__timelines={"video":tl}
</script>
<script src="/js/gsap.min.js"><\/script>
</body>
</html>
